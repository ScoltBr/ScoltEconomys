database:
  host: 127.0.0.1
  port: 3306
  name: scolteconomys
  user: root
  password: ""
  use-ssl: false

  pool:
    max-size: 20
    min-idle: 5
    max-lifetime-ms: 1800000
    connection-timeout-ms: 5000

flush:
  interval-seconds: 120
  max-accounts-per-flush: 250

defaults:
  wallet: 0.0
  bank: 0.0

tax:
  transfer:
    enabled: true
    rate: 0.03 # 3%
    min-fee: 0.0
    max-fee: 9999999.0
  withdraw:
    enabled: true
    rate: 0.10 # 10%
    min-fee: 0.0
    max-fee: 999999999.0

treasury:
  enabled: true
  wallet-account: TREASURY # só um identificador lógico (não é player)

# Configurações de Auditoria
audit:
  file:
    # Habilitar gravação em arquivo (recomendado: true)
    enabled: true
    path: "audit-transactions.log"
  console:
    # Habilitar mensagens de auditoria no console (false para evitar SPAM com 500+ jogadores)
    enabled: false
  buffer-size: 5000

bank:
  enabled: true
  max-balance: 1.0E9

  interest:
    enabled: true
    interval-seconds: 600 # 10 min
    rate: 0.002 # 0.2% por intervalo
    cap-per-interval: 5000.0 # teto de juros por intervalo
    online-only: true # juros apenas para jogadores que entrarem no servidor no intervalo

stats:
  enabled: true
  interval-seconds: 600 # 10 min

alerts:
  enabled: true
  # Crescimento diário (totalCoins) acima disso vira alerta (ex: 0.15 = 15%)
  growth-high: 0.15
  # Concentração top10 acima disso vira alerta (ex: 0.70 = 70%)
  concentration-high: 0.7
  # Total coins mínimo para começar a alertar (evita falso positivo em servidor vazio)
  min-total-coins: 100000.0